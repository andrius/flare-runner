name: demo

# The proof: this job runs ON a flare-runner Cloudflare Container (ephemeral,
# one-shot, no Docker daemon). Everything else in this repo runs on
# GitHub-hosted runners. Companion: demo-cache.yml shows the caching patterns.
on:
  workflow_dispatch:
  push:
    paths:
      - demo/**
      - .github/workflows/demo.yml

permissions:
  contents: read
  packages: write

jobs:
  on-cloudflare:
    runs-on: [self-hosted, cloudflare]
    steps:
      - uses: actions/checkout@v7

      - name: Where am I (Cloudflare Container runner, no Docker daemon)
        run: |
          echo "runner=$RUNNER_NAME  os=$(uname -srm)"
          buildah --version
          skopeo --version
          docker info >/dev/null 2>&1 \
            && echo "docker: present (unexpected)" \
            || echo "docker: absent (expected - no DinD)"

      - name: Run the tiny Python API and smoke /health
        run: |
          python3 demo/app.py &
          pid=$!
          sleep 2
          curl -fsS http://localhost:8080/health; echo
          kill "$pid"

      - name: Build an image without Docker (buildah) and push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io
          img="ghcr.io/${{ github.repository }}-demo:latest"
          # overlay storage (vfs runs the disk out on real builds); the base image
          # short name (python:3.13-slim) resolves via the image's baked
          # /etc/containers/registries.conf.
          buildah build --isolation chroot --storage-driver overlay -f demo/Dockerfile -t "$img" demo
          buildah push --storage-driver overlay "$img"
          echo "pushed $img"

      - name: Retag with skopeo (daemonless manifest copy)
        env:
          REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login -u "${{ github.actor }}" --password-stdin ghcr.io
          src="docker://ghcr.io/${{ github.repository }}-demo:latest"
          dst="docker://ghcr.io/${{ github.repository }}-demo:proof"
          skopeo copy "$src" "$dst"
          echo "retagged -> $dst"

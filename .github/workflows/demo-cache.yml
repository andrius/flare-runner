name: demo-cache

# Caching on a fresh-every-time runner. A one-shot Cloudflare Container starts
# with empty caches, so we move them off the box: actions/cache over HTTPS for
# files, the registry for image layers. Both run on flare-runner, no Docker
# daemon. Companion to the "Caching CI on Ephemeral Runners" post.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Example 1: build/test WITH cache, no Docker. Dependencies are restored over
  # HTTPS (actions/cache, here via setup-node) so `npm ci` + typecheck + test
  # don't refetch the world on a clean container.
  cached-test:
    runs-on: [self-hosted, cloudflare]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm           # caches ~/.npm, keyed on package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Example 2: build an image WITH cache, no Docker. buildah stores layers in the
  # registry (--cache-from/--cache-to) so a fresh container reuses the stable
  # ones; overlay storage keeps the build off the vfs disk-blowup path.
  cached-image:
    runs-on: [self-hosted, cloudflare]
    steps:
      - uses: actions/checkout@v7
      - name: Build demo image with a registry layer cache
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login -u "${{ github.actor }}" --password-stdin ghcr.io
          img="ghcr.io/${{ github.repository }}-demo:cache"
          cache="ghcr.io/${{ github.repository }}-buildcache"
          start=$(date +%s)
          buildah build \
            --layers --cache-from "$cache" --cache-to "$cache" \
            --isolation chroot --storage-driver overlay \
            -f demo/Dockerfile -t "$img" demo
          buildah push --storage-driver overlay "$img"
          echo "::notice::buildah build+push = $(( $(date +%s) - start ))s (re-run to see the warm cache)"
